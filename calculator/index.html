<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://code.jquery.com/jquery-3.2.1.js" integrity="sha256-DZAnKJ/6XZ9si04Hgrsxu/8s717jcIzLy3oi35EouyE=" crossorigin="anonymous"></script>  
    <link rel="stylesheet" href="main.css">
    <title>電卓</title>
  </head>

  <body translate="no">
    <div class="display-css" id="display"></div>

    <button id="7">7</button>
    <button id="8">8</button>
    <button id="9">9</button>
    <button id="plus">+</button><br>
    
    <button id="4">4</button>
    <button id="5">5</button>
    <button id="6">6</button>
    <button id="minus">-</button><br>
    
    <button id="1">1</button>
    <button id="2">2</button>
    <button id="3">3</button>
    <button id="times">*</button><br>

    <button id="0">0</button>
    <button id="00">00</button>
    <button id="point">.</button>
    <button id="divided">/</button><br>

    <button class=long id="clear">AC</button>
    <button class=long id="equal">=</button>

    <script src="main.js"></script>
  </body>
</html>
